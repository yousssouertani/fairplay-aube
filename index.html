<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair Play Objectif</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
.app{max-width:700px;margin:auto;background:#fff;min-height:100vh;padding:20px}
.nav{display:flex;gap:10px;margin-bottom:20px}
.nav button{flex:1;padding:10px;border:none;border-radius:8px;background:#e5e7eb;cursor:pointer}
.nav button.active{background:#2563eb;color:white}
.section{display:none}
.section.active{display:block}
.card{background:#f9fafb;padding:15px;margin:10px 0;border-radius:10px;border:1px solid #e5e7eb}
input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
button.action{background:#2563eb;color:white;margin-top:10px}
.qr{margin-top:10px}
</style>
</head>

<body>
<div class="app">

<div class="nav">
<button class="active" data-target="admin">Admin</button>
<button data-target="coach">Coach</button>
<button data-target="sec">Secrétaire</button>
<button data-target="rank">Classement</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section active">
<h2>Créer un match</h2>

<input id="teamA" placeholder="Equipe A">
<input id="teamB" placeholder="Equipe B">

<button class="action" onclick="createMatch()">Créer match</button>

<div id="matches"></div>
</div>

<!-- COACH -->
<div id="coach" class="section">
<h2>Espace Coach</h2>

<input id="coachCode" placeholder="Code match">
<button onclick="loadCoach()">Valider</button>

<div id="coachUI"></div>
</div>

<!-- SECRETAIRE -->
<div id="sec" class="section">
<h2>Espace Secrétaire</h2>

<input id="secCode" placeholder="Code match">
<button onclick="loadSec()">Valider</button>

<div id="secUI"></div>
</div>

<!-- CLASSEMENT -->
<div id="rank" class="section">
<h2>Classement</h2>
<div id="ranking"></div>
</div>

</div>

<script>

// NAV
document.querySelectorAll(".nav button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
btn.classList.add("active")
document.getElementById(btn.dataset.target).classList.add("active")
}
})

// DATA
let matches = JSON.parse(localStorage.getItem("matches") || "[]")

function save(){
localStorage.setItem("matches", JSON.stringify(matches))
renderMatches()
renderRanking()
}

// CREATE MATCH
function createMatch(){
let A = teamA.value
let B = teamB.value
if(!A||!B)return alert("Remplis")

let code = Math.floor(1000 + Math.random()*9000)

matches.push({code,A,B,score:0})
save()
}

// RENDER MATCH
function renderMatches(){
matchesDiv.innerHTML=""

matches.forEach(m=>{
let url = window.location.href + "?code=" + m.code

matchesDiv.innerHTML += `
<div class="card">
<b>${m.A} vs ${m.B}</b><br>
Code: ${m.code}

<div class="qr" id="qr-${m.code}"></div>

<a href="https://wa.me/?text=Match%20code%20:${m.code}%20Lien:%20${url}" target="_blank">
<button>Envoyer WhatsApp</button>
</a>
</div>
`

setTimeout(()=>{
QRCode.toCanvas(document.getElementById(`qr-${m.code}`), url)
},100)
})
}

// COACH
function loadCoach(){
let m = matches.find(x=>x.code==coachCode.value)
if(!m)return alert("Code invalide")

coachUI.innerHTML=`
<p>${m.A} vs ${m.B}</p>
<button onclick="submitCoach(${m.code},1)">👍</button>
<button onclick="submitCoach(${m.code},2)">🔥</button>
`
}

function submitCoach(code,val){
let m = matches.find(x=>x.code==code)
m.score += val
save()
alert("Envoyé")
}

// SEC
function loadSec(){
let m = matches.find(x=>x.code==secCode.value)
if(!m)return alert("Code invalide")

secUI.innerHTML=`
<button onclick="submitSec(${m.code},3)">3</button>
<button onclick="submitSec(${m.code},5)">5</button>
`
}

function submitSec(code,val){
let m = matches.find(x=>x.code==code)
m.score += val
save()
alert("Envoyé")
}

// RANK
function renderRanking(){
ranking.innerHTML=""

let sorted=[...matches].sort((a,b)=>b.score-a.score)

sorted.forEach((m,i)=>{
ranking.innerHTML+=`
<div class="card">
${i+1}. ${m.A} vs ${m.B} → ${m.score}
</div>`
})
}

// INIT
renderMatches()
renderRanking()

</script>

</body>
</html>
